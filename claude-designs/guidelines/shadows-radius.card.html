<!-- @dsCard group="Spacing" viewport="700x200" name="Shadows & Radius" subtitle="Elevated float shadow · 12px radius · inset highlight" -->
<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<style>body{margin:0;padding:20px 24px;background:#e8e5e0;font-family:var(--font-body)}</style>
</head><body>
<div style="display:flex;gap:16px;align-items:flex-start;">
  <div style="flex:1;background:#fff;border-radius:12px;padding:20px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.04),inset 0 1.5px 0 0 rgba(255,255,255,0.8);">
    <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#6b7280;margin-bottom:8px;">Component A — Floating</div>
    <div style="font-family:'Inter',sans-serif;font-size:24px;font-weight:900;letter-spacing:-0.03em;color:#111;">$284,500</div>
    <div style="font-size:11px;color:#6b7280;margin-top:6px;">shadow: 0 10px 25px −5px rgba(0,0,0,0.04) + inset highlight</div>
  </div>
  <div style="flex:1;background:#fff;border-radius:12px;padding:20px;border:1px solid #e2e0d8;">
    <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#6b7280;margin-bottom:8px;">Component B — Flat</div>
    <div style="font-size:15px;color:#111;">Transaction log · zero shadow</div>
    <div style="font-size:11px;color:#6b7280;margin-top:6px;">No shadow · hairline border · 12px radius</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;align-items:flex-start;">
    <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#6b7280;margin-bottom:4px;">Radius</div>
    <div style="background:#fff;border-radius:12px;border:1px solid #e2e0d8;padding:10px 14px;font-size:12px;color:#111;">12px — All cards</div>
    <div style="background:#e2f4e8;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#113a24;">6px — Badges</div>
    <div style="background:#fff;border-radius:12px;border:1px solid #e2e0d8;padding:8px 16px;font-size:13px;font-weight:600;color:#111;">12px — Buttons</div>
  </div>
</div>
</body></html>
