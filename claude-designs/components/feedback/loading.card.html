<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>*,*::before,*::after{box-sizing:border-box}body{margin:0;padding:16px;background:var(--canvas);font-family:var(--font-body)}</style>
</head><body>
<div id="root"></div>
<script type="text/babel">
const NS = window.AbhishekSikkaPersonalOSDesignSystem_0177da;
if (!NS) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;font-family:system-ui;color:#6b7280;font-size:14px;">Bundle compiling — reload after build completes.</div>';
} else {
  const { Skeleton, SkeletonGroup, Spinner, ProgressBar, Button, MetricCard } = NS;

  function Label({ children }) {
    return <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: 'var(--text-muted)', marginBottom: 10 }}>{children}</div>;
  }
  function Card({ children }) {
    return <div style={{ background: 'var(--card-surface)', borderRadius: 12, boxShadow: 'var(--shadow-card)', padding: 16 }}>{children}</div>;
  }

  function Demo() {
    return (
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 16 }}>
        <div>
          <Label>Skeleton — metric card</Label>
          <Card>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              <Skeleton variant="text" width="50%" />
              <Skeleton variant="title" width="70%" height={26} />
              <Skeleton variant="text" width="40%" />
            </div>
          </Card>
        </div>

        <div>
          <Label>Skeleton — table rows</Label>
          <Card>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              <Skeleton variant="row" />
              <Skeleton variant="row" />
              <Skeleton variant="row" />
            </div>
          </Card>
        </div>

        <div>
          <Label>Inline Spinner — button save</Label>
          <Card>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <Button disabled icon={<Spinner size={14} color="var(--btn-primary-text)" />}>Saving…</Button>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: 'var(--text-muted)', fontSize: 13 }}>
                <Spinner size={14} /> Refreshing row…
              </div>
            </div>
          </Card>
        </div>

        <div>
          <Label>Progress Bar — real progress</Label>
          <Card>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <ProgressBar value={62} label="Importing transactions…" />
              <ProgressBar indeterminate label="Syncing with bank…" />
            </div>
          </Card>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
}
</script>
</body></html>
