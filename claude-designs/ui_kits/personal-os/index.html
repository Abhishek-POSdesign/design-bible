// ─── PRIMITIVES ──────────────────────────────────────────────────────────────
function Badge({text, variant='neutral'}) {
  const cfg = {
    success:{bg:'#e2f4e8',c:'#1b5232'}, alert:{bg:'#fbeceb',c:'#7f231c'},
    green:{bg:'#e2f4e8',c:'#113a24'},   blue:{bg:'#e3f2fd',c:'#0d47a1'},
    mint:{bg:'#ccebda',c:'#113a24'},    gold:{bg:'#fdf0cd',c:'#7a4800'},
    lavender:{bg:'#dcd6f7',c:'#4a148c'},neutral:{bg:'var(--btn-muted-bg)',c:'var(--text-muted)'},
  }[variant] || {bg:'var(--btn-muted-bg)',c:'var(--text-muted)'};
  return <span style={{display:'inline-flex',alignItems:'center',fontFamily:'var(--font-body)',fontSize:'0.6875rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',padding:'3px 8px',borderRadius:6,backgroundColor:cfg.bg,color:cfg.c,whiteSpace:'nowrap',lineHeight:1.4}}>{text}</span>;
}

function Avatar({name='AS', status}) {
  const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2);
  const dot = {synced:'#113a24',syncing:'#0d47a1',offline:'#7f231c'}[status];
  return (
    <div style={{position:'relative',display:'inline-flex',flexShrink:0}}>
      <div style={{width:32,height:32,borderRadius:'50%',backgroundColor:'var(--btn-muted-bg)',border:'1px solid var(--border-hairline)',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--font-body)',fontSize:'0.75rem',fontWeight:600,color:'var(--text-primary)',userSelect:'none'}}>
        {initials}
      </div>
      {dot && <span style={{position:'absolute',bottom:0,right:0,width:9,height:9,borderRadius:'50%',backgroundColor:dot,border:'1.5px solid var(--card-surface)'}}/>}
    </div>
  );
}

function DonutChart() {
  const r=54, circ=2*Math.PI*r, tot=donutSegs.reduce((s,g)=>s+g.value,0);
  let acc=0;
  return (
    <div style={{position:'relative',width:120,height:120,flexShrink:0}}>
      <svg width="120" height="120" style={{display:'block',transform:'rotate(-90deg)'}}>
        <circle cx="60" cy="60" r={r} fill="none" stroke="var(--track-fallback)" strokeWidth="12"/>
        {donutSegs.map((seg,i)=>{
          const frac=seg.value/tot, len=frac*circ, off=-(acc/tot)*circ; acc+=seg.value;
          return <circle key={i} cx="60" cy="60" r={r} fill="none" stroke={seg.color} strokeWidth="12" strokeDasharray={`${len} ${circ-len}`} strokeDashoffset={off}/>;
        })}
      </svg>
      <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:2}}>
        <span style={{fontFamily:'var(--font-display)',fontSize:'1.125rem',fontWeight:900,color:'var(--text-primary)',fontVariantNumeric:'tabular-nums',lineHeight:1}}>75%</span>
        <span style={{fontFamily:'var(--font-body)',fontSize:'0.5625rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Equity</span>
      </div>
    </div>
  );
}

// ─── CARDS ───────────────────────────────────────────────────────────────────
function MetricCard({label,value,unit,delta,pos,sub,bv,bt}) {
  return (
    <div style={{backgroundColor:'var(--card-surface)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-card)',padding:'var(--space-xl)',display:'flex',flexDirection:'column',gap:'var(--space-sm)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span style={{fontFamily:'var(--font-body)',fontSize:'0.6875rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>{label}</span>
        {bv && <Badge text={bt} variant={bv}/>}
      </div>
      <div style={{display:'flex',alignItems:'baseline',gap:4}}>
        <span style={{fontFamily:'var(--font-display)',fontSize:'2rem',fontWeight:900,letterSpacing:'-0.03em',lineHeight:1.05,color:'var(--text-primary)',fontVariantNumeric:'tabular-nums'}}>{value}</span>
        {unit && <span style={{fontFamily:'var(--font-body)',fontSize:'0.875rem',fontWeight:500,color:'var(--text-muted)'}}>{unit}</span>}
      </div>
      {(delta||sub) && (
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          {delta && <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',fontWeight:600,color:pos?'#113a24':'#7f231c',fontVariantNumeric:'tabular-nums'}}>{pos?'▲':'▼'} {delta}</span>}
          {sub && <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',color:'var(--text-muted)'}}>{sub}</span>}
        </div>
      )}
    </div>
  );
}

function TrophyCard({theme='mint',title,value,unit,description,progress}) {
  const t = {
    mint:    {bg:'var(--trophy-mint-bg)',    sh:'0 8px 24px -4px var(--trophy-mint-shadow)'},
    gold:    {bg:'var(--trophy-gold-bg)',    sh:'0 8px 24px -4px var(--trophy-gold-shadow)'},
    lavender:{bg:'var(--trophy-lavender-bg)',sh:'0 8px 24px -4px var(--trophy-lavender-shadow)'},
  }[theme];
  return (
    <div style={{backgroundColor:t.bg,boxShadow:t.sh,borderRadius:'var(--radius)',padding:'var(--space-2xl)',display:'flex',flexDirection:'column',gap:'var(--space-md)'}}>
      <span style={{fontFamily:'var(--font-body)',fontSize:'0.6875rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-primary)',opacity:0.55}}>{title}</span>
      <div style={{display:'flex',alignItems:'baseline',gap:4}}>
        <span style={{fontFamily:'var(--font-display)',fontSize:'2.5rem',fontWeight:900,letterSpacing:'-0.04em',lineHeight:1.05,color:'var(--text-primary)',fontVariantNumeric:'tabular-nums'}}>{value}</span>
        {unit && <span style={{fontFamily:'var(--font-body)',fontSize:'1rem',fontWeight:600,color:'var(--text-primary)',opacity:0.6}}>{unit}</span>}
      </div>
      {description && <p style={{fontFamily:'var(--font-body)',fontSize:'0.875rem',color:'var(--text-primary)',opacity:0.6,margin:0,lineHeight:1.5}}>{description}</p>}
      {progress!=null && (
        <div style={{height:4,borderRadius:2,backgroundColor:'rgba(0,0,0,0.1)',overflow:'hidden',marginTop:4}}>
          <div style={{height:'100%',width:`${Math.min(100,progress)}%`,backgroundColor:'var(--text-primary)',opacity:0.35,borderRadius:2}}/>
        </div>
      )}
    </div>
  );
}

// ─── DATA ROW ────────────────────────────────────────────────────────────────
function DataRow({label,meta,value,bv,bt,onClick}) {
  const [hov,setHov] = React.useState(false);
  return (
    <div onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 16px',borderBottom:'1px solid var(--border-hairline)',backgroundColor:hov&&onClick?'rgba(0,0,0,0.018)':'transparent',cursor:onClick?'pointer':'default',transition:'background-color 100ms ease'}}>
      <div style={{display:'flex',alignItems:'center',gap:8,minWidth:0}}>
        <span style={{fontFamily:'var(--font-body)',fontSize:'0.9375rem',color:'var(--text-primary)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{label}</span>
        {meta && <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',color:'var(--text-muted)',whiteSpace:'nowrap',flexShrink:0}}>{meta}</span>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0,marginLeft:12}}>
        {bv && <Badge text={bt} variant={bv}/>}
        {value && <span style={{fontFamily:'var(--font-body)',fontSize:'0.9375rem',fontWeight:500,color:'var(--text-primary)',fontVariantNumeric:'tabular-nums'}}>{value}</span>}
      </div>
    </div>
  );
}

    <nav style={{width:w,minWidth:w,height:'100vh',backgroundColor:'var(--card-surface)',borderRight:'1px solid var(--border-hairline)',display:'flex',flexDirection:'column',overflow:'hidden',transition:'width 280ms cubic-bezier(0.25,1,0.5,1),min-width 280ms cubic-bezier(0.25,1,0.5,1)',flexShrink:0,position:'relative'}}>

        {!collapsed && (
          <div style={{overflow:'hidden'}}>
            <div style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'0.9375rem',letterSpacing:'-0.03em',color:'var(--text-primary)',lineHeight:1.1,whiteSpace:'nowrap'}}>Abhishek Sikka</div>
            <div style={{fontFamily:'var(--font-body)',fontSize:'0.6875rem',color:'var(--text-muted)',whiteSpace:'nowrap',marginTop:2}}>Personal OS</div>
          </div>
        )}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'8px 0'}}>
        {navItems.map(({id,label,Icon}) => {
          const active = id === module;
          return (
            <div key={id} onClick={()=>onModule(id)}
              style={{display:'flex',alignItems:'center',gap:8,padding:collapsed?'10px 0':'10px 20px',justifyContent:collapsed?'center':'flex-start',cursor:'pointer',backgroundColor:active?'rgba(0,0,0,0.045)':'transparent',borderLeft:active?'2px solid var(--text-primary)':'2px solid transparent',transition:'background-color 100ms ease'}}>

}

          </div>
          <div style={{borderRadius:'var(--radius)',overflow:'hidden',border:'1px solid var(--border-hairline)',marginBottom:16}}>
            {details.filter(([,v])=>v).map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 16px',borderBottom:'1px solid var(--border-hairline)'}}>
                <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',color:'var(--text-muted)'}}>{k}</span>
                <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',fontWeight:500,color:'var(--text-primary)'}}>{v}</span>
              </div>
            ))}
          </div>
          {item.notes && (
            <div>
              <div style={{fontFamily:'var(--font-body)',fontSize:'0.6875rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)',marginBottom:8}}>Notes</div>
              <p style={{fontFamily:'var(--font-body)',fontSize:'0.875rem',color:'var(--text-primary)',lineHeight:1.6,margin:0}}>{item.notes}</p>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ─── MODULE VIEWS ────────────────────────────────────────────────────────────

      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {finMetrics.map((m,i) => <MetricCard key={i} {...m}/>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'260px 1fr',gap:16,marginBottom:24}}>
        <div style={{backgroundColor:'var(--card-surface)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-card)',padding:'var(--space-xl)',display:'flex',flexDirection:'column',gap:16}}>
          <span style={{fontFamily:'var(--font-body)',fontSize:'0.6875rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Allocation</span>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <DonutChart/>
            <div style={{display:'flex',flexDirection:'column',gap:8,flex:1}}>
              {donutSegs.map((seg,i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:6}}>
                  <div style={{width:8,height:8,borderRadius:2,backgroundColor:seg.color,flexShrink:0}}/>
                  <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',color:'var(--text-primary)',flex:1}}>{seg.label}</span>
                  <span style={{fontFamily:'var(--font-body)',fontSize:'0.8125rem',fontWeight:600,color:'var(--text-muted)',fontVariantNumeric:'tabular-nums'}}>{seg.value}%</span>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div style={{backgroundColor:'var(--card-surface)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-card)',overflow:'hidden'}}>
          <div style={{padding:'14px 16px 12px',borderBottom:'1px solid var(--border-hairline)'}}>
            <span style={{fontFamily:'var(--font-body)',fontSize:'0.6875rem',fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:'var(--text-muted)'}}>Recent Transactions</span>
          </div>
          {transactions.map((t,i) => <DataRow key={i} label={t.label} meta={t.meta} value={t.value} bv={t.bv} bt={t.bt} onClick={()=>onRowClick(t)}/>)}

      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <TrophyCard theme="gold" title="Net Worth Goal" value="$284K" unit="/ $350K" description="Capital accumulation target — Q4 2024. On pace with current monthly savings rate." progress={81}/>
        <TrophyCard theme="mint" title="Investment Streak" value="18" unit="months" description="Consecutive months hitting DCA target across all brokerage and retirement accounts." progress={100}/>

    </div>
  );
}

function HealthView({onRowClick}) {
  return (
    <div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:16,marginBottom:24}}>
        {healthMetrics.map((m,i) => <MetricCard key={i} {...m}/>)}
      </div>
      <div style={{backgroundColor:'var(--card-surface)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-card)',overflow:'hidden',marginBottom:24}}>

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [collapsed, setCollapsed] = React.useState(false);
  const [module,    setModule]    = React.useState('finance');
  const [flyover,   setFlyover]   = React.useState(null);
  const [dark,      setDark]      = React.useState(false);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    document.documentElement.setAttribute('data-appearance', dark ? 'dark' : 'light');
  }, [dark]);

  // Expose navigation hooks for programmatic control (PPTX export, testing)
  React.useEffect(() => {
    window.__pos = { mod: setModule, fly: setFlyover };
    return () => { delete window.__pos; };
  }, []);

  const titles   = {finance:'Finance', health:'Health', research:'Research', writing:'Writing', dashboard:'Dashboard'};
  const subtitles = {finance:'Q2 2024 · Last synced just now', health:'Jun 30, 2026 · Active day', research:'Reading queue & notes', writing:'Drafts & published', dashboard:'Overview'};

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',backgroundColor:'var(--canvas)'}}>
      <Sidebar collapsed={collapsed} onToggle={()=>setCollapsed(c=>!c)} module={module} onModule={m=>{setModule(m);setFlyover(null);}}/>
      <div style={{flex:1,overflow:'hidden',position:'relative',display:'flex',flexDirection:'column'}}>
        {/* Page header */}
        <div style={{padding:'32px 40px 20px',display:'flex',alignItems:'flex-end',justifyContent:'space-between',flexShrink:0}}>
          <div>
            <h1 style={{fontFamily:'var(--font-display)',fontWeight:900,fontSize:'3rem',letterSpacing:'-0.05em',lineHeight:1.05,color:'var(--text-primary)',margin:0}}>
              {titles[module] || 'Dashboard'}
            </h1>
            <p style={{fontFamily:'var(--font-body)',fontSize:'0.9375rem',color:'var(--text-muted)',margin:'6px 0 0',lineHeight:1}}>
              {subtitles[module]}
            </p>
          </div>
          <button
            onClick={()=>setDark(d=>!d)}
            style={{display:'flex',alignItems:'center',gap:6,fontFamily:'var(--font-body)',fontSize:'0.875rem',fontWeight:500,color:'var(--text-muted)',backgroundColor:'var(--card-surface)',border:'1px solid var(--border-hairline)',borderRadius:'var(--radius)',padding:'8px 14px',transition:'transform 150ms cubic-bezier(0.16,1,0.3,1)'}}>
            {dark ? <SunIco/> : <MoonIco/>}
            {dark ? 'Light Mode' : 'Dark Mode'}
          </button>
        </div>
        {/* Scrollable content */}
        <div style={{flex:1,overflowY:'auto',padding:'4px 40px 40px'}}>
          {module === 'finance' ? <FinanceView onRowClick={setFlyover}/> :
           module === 'health'  ? <HealthView  onRowClick={setFlyover}/> : (
            <EmptyState
              icon={<FolderIco s={28}/>}
              title={`No ${titles[module].toLowerCase()} yet`}
              subtitle={`The ${titles[module]} module is on the 3-month consolidation roadmap.`}
            />
          )}
        </div>
        {/* Flyover */}
        {flyover && <FlyoverPanel item={flyover} onClose={()=>setFlyover(null)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
